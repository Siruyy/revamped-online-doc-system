services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: svci_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    ports:
      - '8000:8000'
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=svci_dev
      - DB_USERNAME=svci_dev
      - DB_PASSWORD=svci_secret
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - svci

  mysql:
    image: mysql:8
    container_name: svci_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: svci_dev
      MYSQL_USER: svci_dev
      MYSQL_PASSWORD: svci_secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./.docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '3306:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot_secret']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - svci

  reverb:
    image: php:8.3-cli-alpine
    container_name: svci_reverb
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - '8080:8080'
    depends_on:
      - app
    networks:
      - svci

  mailhog:
    image: mailhog/mailhog:latest
    container_name: svci_mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI
    networks:
      - svci

volumes:
  mysql_data:
    driver: local

networks:
  svci:
    driver: bridge
