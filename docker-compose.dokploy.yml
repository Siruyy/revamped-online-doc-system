x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  args:
    VITE_APP_NAME: ${APP_NAME:-SVCI Document System}
    PUBLIC_REVERB_KEY: ${REVERB_APP_KEY:-default_reverb_key}
    VITE_REVERB_HOST: ${VITE_REVERB_HOST:-svci-ws.siruyy.cloud}
    VITE_REVERB_PORT: ${VITE_REVERB_PORT:-443}
    VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-https}

services:
  app:
    build: *app-build
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-SVCI Document System}
      APP_ENV: production
      APP_KEY: ${APP_KEY:-base64:changeme_APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://svci.siruyy.cloud}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Manila}
      LOG_CHANNEL: ${LOG_CHANNEL:-daily}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-svci}
      DB_USERNAME: ${DB_USERNAME:-svci_app}
      DB_PASSWORD: ${DB_PASSWORD:-svci_db_pass_2026}
      SESSION_DRIVER: database
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID:-svci}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-svci_reverb_key_default}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-svci_reverb_secret_default}
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_ALLOWED_ORIGINS: ${REVERB_ALLOWED_ORIGINS:-https://svci.siruyy.cloud}
      VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-svci_reverb_key_default}
      VITE_REVERB_HOST: ${VITE_REVERB_HOST:-svci-ws.siruyy.cloud}
      VITE_REVERB_PORT: ${VITE_REVERB_PORT:-443}
      VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-https}
      FILESYSTEM_DISK: local
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@siruyy.cloud}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-SVCI Document System}
      RUN_MIGRATIONS: "true"
    volumes:
      - app_storage:/var/www/html/storage/app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "80"

  queue:
    build: *app-build
    restart: unless-stopped
    command: ["supervisord", "-c", "/etc/supervisord-queue.conf"]
    environment:
      APP_NAME: ${APP_NAME:-SVCI Document System}
      APP_ENV: production
      APP_KEY: ${APP_KEY:-base64:changeme_APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://svci.siruyy.cloud}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Manila}
      LOG_CHANNEL: ${LOG_CHANNEL:-daily}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-svci}
      DB_USERNAME: ${DB_USERNAME:-svci_app}
      DB_PASSWORD: ${DB_PASSWORD:-svci_db_pass_2026}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID:-svci}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-svci_reverb_key_default}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-svci_reverb_secret_default}
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_ALLOWED_ORIGINS: ${REVERB_ALLOWED_ORIGINS:-https://svci.siruyy.cloud}
      FILESYSTEM_DISK: local
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@siruyy.cloud}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-SVCI Document System}
      RUN_MIGRATIONS: "false"
    volumes:
      - app_storage:/var/www/html/storage/app
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started

  reverb:
    build: *app-build
    restart: unless-stopped
    command: ["supervisord", "-c", "/etc/supervisord-reverb.conf"]
    environment:
      APP_NAME: ${APP_NAME:-SVCI Document System}
      APP_ENV: production
      APP_KEY: ${APP_KEY:-base64:changeme_APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://svci.siruyy.cloud}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-svci}
      DB_USERNAME: ${DB_USERNAME:-svci_app}
      DB_PASSWORD: ${DB_PASSWORD:-svci_db_pass_2026}
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID:-svci}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-svci_reverb_key_default}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-svci_reverb_secret_default}
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_ALLOWED_ORIGINS: ${REVERB_ALLOWED_ORIGINS:-https://svci.siruyy.cloud}
      RUN_MIGRATIONS: "false"
    volumes:
      - app_storage:/var/www/html/storage/app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080"

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-svci}
      MYSQL_USER: ${DB_USERNAME:-svci_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-svci_db_pass_2026}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-svci_root_pass_2026}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-svci_root_pass_2026}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  app_storage:
  mysql_data:
